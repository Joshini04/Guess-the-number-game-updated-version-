<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guess The Number Game</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
</head>
<body>

  <div class="game-wrapper">
    <div class="game-card">

      <!-- HEADER -->
      <div class="game-header">
        <div class="dice-icon"><i class="bx bx-dice-5"></i></div>
        <h1>Guess The Number</h1>
        <p id="rangeLabel">I'm thinking of a number between 1 and 100</p>
      </div>

      <!-- DIFFICULTY -->
      <div class="diff-row">
        <label for="diffSel"><i class="bx bx-slider"></i> Difficulty:</label>
        <select id="diffSel" onchange="newGame()">
          <option value="easy">Easy — 1 to 50 (12 tries)</option>
          <option value="medium" selected>Medium — 1 to 100 (10 tries)</option>
          <option value="hard">Hard — 1 to 200 (8 tries)</option>
          <option value="expert">Expert — 1 to 500 (7 tries)</option>
        </select>
      </div>

      <!-- STATS -->
      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-val" id="attemptsLeft">10</span>
          <span class="stat-lbl">attempts left</span>
        </div>
        <div class="stat-box">
          <span class="stat-val" id="guessesMade">0</span>
          <span class="stat-lbl">guesses made</span>
        </div>
        <div class="stat-box">
          <span class="stat-val" id="bestStat">—</span>
          <span class="stat-lbl">best score</span>
        </div>
      </div>

      <!-- PROGRESS BAR -->
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <!-- FEEDBACK -->
      <div class="feedback-box" id="feedback">
        <i class="bx bx-bulb"></i>
        <span>Enter your first guess!</span>
      </div>

      <!-- HOT/COLD HINT -->
      <p class="hint-text" id="hintBox"></p>

      <!-- INPUT -->
      <div class="input-row">
        <input class="guess-input" type="number" id="guessInput" placeholder="Your guess…" autocomplete="off" />
        <button class="btn-guess" id="guessBtn" onclick="makeGuess()">
          <i class="bx bx-send"></i> Guess
        </button>
      </div>

      <!-- HISTORY -->
      <p class="history-label">Guess history</p>
      <div class="history-pills" id="historyPills"></div>

      <!-- NEW GAME -->
      <button class="btn-new" onclick="newGame()">
        <i class="bx bx-refresh"></i> New Game
      </button>

      <!-- SCOREBOARD -->
      <div class="score-board">
        <span>Wins: <b id="totalWins">0</b></span>
        <span>Losses: <b id="totalLoss">0</b></span>
        <span>Win rate: <b id="winRate">—</b></span>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
